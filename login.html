<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2 Tech Elite | Portal de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-sm glass-panel p-10 rounded-[3rem] shadow-2xl space-y-8 relative z-10">
        <div class="text-center space-y-2">
            <div class="inline-block p-4 bg-indigo-600/10 rounded-3xl mb-4 border border-indigo-500/20">
                <i class="fas fa-shield-alt text-3xl text-indigo-500"></i>
            </div>
            <h2 class="text-white font-black text-2xl uppercase italic tracking-tighter">A2 Tech <span class="text-indigo-500">Elite</span></h2>
            <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[4px]">Acesso Restrito ao Sistema</p>
        </div>

       <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-user-lock absolute left-5 top-5 text-slate-600 text-[10px]"></i>
                <input type="text" id="user" autocomplete="off" value="" placeholder="USUÁRIO" class="w-full bg-black/40 border border-white/5 p-5 pl-12 rounded-2xl text-white text-[10px] font-bold tracking-[0.2em] outline-none focus:border-indigo-500 transition-all uppercase">
            </div>
            
            <div class="relative">
                <i class="fas fa-key absolute left-5 top-5 text-slate-600 text-[10px]"></i>
                <input type="password" id="pass" autocomplete="new-password" value="" placeholder="SENHA" class="w-full bg-black/40 border border-white/5 p-5 pl-12 rounded-2xl text-white text-[10px] font-bold tracking-[0.2em] outline-none focus:border-indigo-500 transition-all">
            </div>
        </div>

        <button onclick="fazerLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black uppercase text-[10px] tracking-[0.3em] shadow-xl shadow-indigo-600/20 transition-all active:scale-95">
            AUTENTICAR
        </button>
        
        <div class="text-center">
            <a href="index.html" class="text-[9px] font-black text-slate-600 hover:text-indigo-400 uppercase tracking-widest transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Sair do Portal
            </a>
        </div>
    </div>

    <script>
        function fazerLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const s = document.getElementById('pass').value;

            // CREDENCIAIS A2 TECH ELITE
            if (u === "andrey" && s === "0607") {
                localStorage.setItem("shark_auth", "true");
                localStorage.setItem("user_level", "SHARK");
                window.location.href = "admin.html";
            } 
            else if (u === "vendedor" && s === "0607") {
                localStorage.setItem("shark_auth", "true");
                localStorage.setItem("user_level", "VENDEDOR");
                window.location.href = "admin.html";
            } 
            else {
                alert("Acesso negado para o sistema Elite.");
            }
        }
    </script>
</body>
</html>
